<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0c0c0c"/>
      <stop offset="1" stop-color="#161616"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- subtle grid -->
  <g stroke="#1d1d1d" stroke-width="1">
    <line x1="0" y1="157" x2="1200" y2="157"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="472" x2="1200" y2="472"/>
    <line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="900" y1="0" x2="900" y2="630"/>
  </g>

  <!-- logo mark -->
  <rect x="80" y="80" width="92" height="92" rx="20" fill="#0a0a0a" stroke="#00c9a7" stroke-width="3"/>
  <text x="126" y="146" font-family="'JetBrains Mono', monospace" font-size="50" font-weight="900" fill="#00c9a7" text-anchor="middle">Tr</text>

  <!-- title -->
  <text x="80" y="320" font-family="'JetBrains Mono', monospace" font-size="84" font-weight="900" fill="#ffffff">TRA<tspan fill="#00c9a7">CE</tspan></text>

  <!-- tagline -->
  <text x="82" y="386" font-family="Inter, sans-serif" font-size="34" font-weight="600" fill="#cfcfcf">Visualize Python code &amp; algorithms,</text>
  <text x="82" y="430" font-family="Inter, sans-serif" font-size="34" font-weight="600" fill="#cfcfcf">line by line, in your browser.</text>

  <!-- chips -->
  <g font-family="'JetBrains Mono', monospace" font-size="20" font-weight="700">
    <rect x="82"  y="486" width="150" height="46" rx="8" fill="none" stroke="#2a2a2a" stroke-width="1.5"/>
    <text x="157" y="516" fill="#9fe9da" text-anchor="middle">Arrays</text>
    <rect x="248" y="486" width="170" height="46" rx="8" fill="none" stroke="#2a2a2a" stroke-width="1.5"/>
    <text x="333" y="516" fill="#9fe9da" text-anchor="middle">Trees</text>
    <rect x="434" y="486" width="210" height="46" rx="8" fill="none" stroke="#2a2a2a" stroke-width="1.5"/>
    <text x="539" y="516" fill="#9fe9da" text-anchor="middle">Recursion</text>
    <rect x="660" y="486" width="180" height="46" rx="8" fill="none" stroke="#2a2a2a" stroke-width="1.5"/>
    <text x="750" y="516" fill="#9fe9da" text-anchor="middle">Heaps</text>
    <rect x="856" y="486" width="160" height="46" rx="8" fill="none" stroke="#2a2a2a" stroke-width="1.5"/>
    <text x="936" y="516" fill="#9fe9da" text-anchor="middle">Graphs</text>
  </g>

  <!-- mini tree illustration right side -->
  <g stroke="#00c9a7" stroke-width="2" fill="#0a0a0a">
    <line x1="1010" y1="150" x2="940" y2="240" stroke="#2f6f63"/>
    <line x1="1010" y1="150" x2="1080" y2="240" stroke="#2f6f63"/>
    <line x1="940" y1="240" x2="900" y2="330" stroke="#2f6f63"/>
    <line x1="940" y1="240" x2="985" y2="330" stroke="#2f6f63"/>
    <circle cx="1010" cy="150" r="30"/>
    <circle cx="940" cy="240" r="30"/>
    <circle cx="1080" cy="240" r="30"/>
    <circle cx="900" cy="330" r="30"/>
    <circle cx="985" cy="330" r="30"/>
  </g>
  <g font-family="'JetBrains Mono', monospace" font-size="24" font-weight="700" fill="#ffffff" text-anchor="middle">
    <text x="1010" y="159">1</text>
    <text x="940" y="249">2</text>
    <text x="1080" y="249">3</text>
    <text x="900" y="339">4</text>
    <text x="985" y="339">5</text>
  </g>
</svg>
